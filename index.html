<form name="film-submission" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="film-submission">

<label>Film Title</label><br>
<input type="text" name="title" required><br><br>

<label>Creator Name</label><br>
<input type="text" name="creator" required><br><br>

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<label>YouTube Trailer Link</label><br>
<input type="url" name="youtube"><br><br>

<label>Synopsis</label><br>
<textarea name="synopsis"></textarea><br><br>

<button type="submit">
Submit Film
</button>

</form>
